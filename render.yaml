services:
  - type: web
    name: my-memo-app
    env: python
    rootDir: .
    buildCommand: pip install -r requirements.txt && flask db upgrade
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: my-memo-db
          property: connectionString

databases:
  - name: my-memo-db
    plan: free
